name: CI

on:
  push:
    # main is the v2 line; v1-maintenance carries v1 critical/security fixes; the v2
    # feature branch runs full CI pre-merge. PRs from any branch are covered below.
    branches: [main, struct, feature-v2.0.0, v1-maintenance]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded in-flight runs for the same ref so a rapid push sequence doesn't queue
# stale CI and reclaims runners faster (#105). Deliberately NOT added to release.yml, where an
# in-flight tag build must always finish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & coverage (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 25 # cap a hung xvfb/CGO link so it can't pin a runner (#105)
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      # Fyne is a CGO/OpenGL widget toolkit, so even the headless (software-driver)
      # tests need the GL + X11 headers to compile.
      - name: Install Fyne build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc pkg-config libgl1-mesa-dev xorg-dev libxkbcommon-dev xvfb

      - name: gofmt + vet + go.mod hygiene
        run: |
          test -z "$(gofmt -l .)" || { echo 'gofmt needs running on:'; gofmt -l .; exit 1; }
          go vet ./...
          # Supply-chain + tidy gates (#105): verify the module cache against go.sum, and fail
          # if go.mod/go.sum are not tidy (a stray/missing require slips through review otherwise).
          go mod verify
          go mod tidy
          git diff --exit-code go.mod go.sum || { echo 'go.mod/go.sum not tidy — run `go mod tidy` and commit'; exit 1; }

      # -coverpkg=./... credits cross-package coverage (the root widget tests
      # exercise internal/model, internal/geometry, …); -covermode=atomic is
      # required alongside -race. xvfb-run gives a virtual display as a safety net.
      - name: Run tests (race) with cross-package coverage
        run: xvfb-run -a go test ./... -race -covermode=atomic -coverpkg=./... -coverprofile=coverage.out

      # The renderer-backed benchmarks (a real test.NewWindow, so pv.r != nil) must
      # stay compilable and runnable — that blind spot is why an unbounded-rect bug
      # once shipped. Run every benchmark for a single iteration as a smoke check; the
      # pass/fail perf guards themselves are ordinary -race test cases above
      # (TestReflowGridSkipsPrefixWalk, TestSearchHighlightBoundedHorizontal,
      # TestSearchNextZeroAlloc).
      - name: Smoke-run benchmarks (one iteration, renderer-backed)
        run: xvfb-run -a go test -run '^$' -bench . -benchtime=1x ./...

      # Fail on any reachable known vulnerability (stdlib or dependency). govulncheck
      # is call-graph aware, so it flags only code paths actually reachable from this
      # module — a signal-rich gate, not a noisy dependency-version alarm.
      - name: govulncheck (fail on reachable vulnerabilities)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Enforce coverage threshold (> 95%)
        run: |
          total=$(go tool cover -func=coverage.out | awk 'END { gsub("%","",$3); print $3 }')
          echo "Total coverage: ${total}%"
          awk -v c="$total" 'BEGIN {
            if (c+0 <= 95) { printf "FAIL: coverage %.1f%% is not above 95%%\n", c+0; exit 1 }
            printf "OK: coverage %.1f%% is above 95%%\n", c+0
          }'

      # Codecov is best-effort visualization, NOT a gate: the awk threshold step above is the
      # authoritative coverage source of truth, so fail_ci_if_error stays false on purpose —
      # the authoritative race+coverage build must not depend on Codecov uptime/token validity (#105).
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6
        with:
          files: ./coverage.out
          token: ${{ secrets.CODECOV_TOKEN }} # add this repo secret (codecov.io). Public repos can also run tokenless.
          fail_ci_if_error: false
          verbose: true

  build-demo:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20 # cap a hung CGO link / runner (#105)
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: prettyview-demo-linux-amd64
            binary: prettyview-demo
          - os: windows-latest
            artifact: prettyview-demo-windows-amd64
            binary: prettyview-demo.exe
          - os: macos-latest
            artifact: prettyview-demo-macos-arm64
            binary: prettyview-demo
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Fyne build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc pkg-config libgl1-mesa-dev xorg-dev libxkbcommon-dev

      # The Windows runner ships an MSYS2/MinGW gcc on PATH, which CGO needs;
      # surface it (and fail fast with a clear message if it is ever missing).
      - name: Show C compiler (Windows)
        if: runner.os == 'Windows'
        run: gcc --version

      # Run the suite on Windows + macOS so the cross-platform-sensitive paths (clipboard,
      # file dialog, font metrics, geometry rounding) are exercised off Linux — the Linux
      # `test` job above is the authoritative race+coverage run, so skip Linux here (#69).
      # No race/coverage here: a fast correctness pass on the other two OSes.
      - name: Run tests (Windows/macOS)
        if: runner.os != 'Linux'
        env:
          CGO_ENABLED: "1"
        run: go test ./...

      - name: Build demo
        env:
          CGO_ENABLED: "1"
        run: go build -v -o ${{ matrix.binary }} ./cmd/prettyview-demo

      # Package the executable together with the fixtures so a downloaded artifact
      # (GitHub serves it as a single .zip) extracts to the binary alongside
      # testdata/ — the demo's fixture dropdown then loads them out of the box.
      - name: Upload demo (binary + fixtures)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.binary }}
            testdata/
          if-no-files-found: error
