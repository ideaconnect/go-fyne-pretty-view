version: 2
updates:
  # Go module dependencies (Fyne, golang.org/x/net, …).
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    groups:
      go-dependencies:
        patterns:
          - "*"
        # Fyne is the one dependency whose bumps can change widget behavior and the
        # supported-version window, so keep it out of the batch group — it gets its own
        # reviewable PR (see the Fyne compatibility note in the README).
        exclude-patterns:
          - "fyne.io/*"

  # GitHub Actions used by the CI workflow.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    groups:
      actions:
        patterns:
          - "*"
